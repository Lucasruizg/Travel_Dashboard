<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Travel Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Travel Dashboard</h1>
</header>

<main>
    <select id="citySelect">
        <option>Barcelona</option>
        <option>London</option>
        <option>Paris</option>
        <option>New York</option>
        <option>Tokyo</option>
    </select>

    <div id="summary"></div>

    <div id="weather"></div>

    <input id="amount" type="number" placeholder="EUR">
    <button id="convert">Convertir</button>
    <div id="result"></div>

    <div id="message"></div>
</main>

<script src="main.js"></script>
</body>
</html>
